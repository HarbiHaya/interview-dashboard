<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACC Interview Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --card: #13131a;
  --card-hover: #1a1a24;
  --border: #2a2a3a;
  --accent: #8b5cf6;
  --accent-glow: rgba(139,92,246,0.15);
  --accent2: #06b6d4;
  --green: #22c55e;
  --amber: #f59e0b;
  --red: #ef4444;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  background: linear-gradient(180deg, rgba(139,92,246,0.08) 0%, transparent 100%);
  border-bottom: 1px solid var(--border);
  padding: 18px 28px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(20px);
}
.header-right { display:flex; flex-direction:column; }
.header-title {
  font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, #8b5cf6, #06b6d4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.header-stats { display: flex; gap: 20px; }
.stat-item { text-align: center; }
.stat-num { font-size: 22px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

.app { display: flex; height: calc(100vh - 68px); }

.sidebar {
  width: 330px; min-width: 330px;
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  background: var(--card);
}
.filters {
  padding: 14px;
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 8px;
}
.search-box {
  background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
  padding: 9px 14px; color: var(--text); font-family: inherit; font-size: 13px; width: 100%;
  transition: border-color 0.2s;
}
.search-box:focus { outline: none; border-color: var(--accent); }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-chip {
  padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--text-dim); font-family: inherit; font-size: 11px;
  cursor: pointer; transition: all 0.2s;
}
.filter-chip:hover { border-color: var(--accent); color: var(--text); }
.filter-chip.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

.applicant-list { flex: 1; overflow-y: auto; padding: 6px; }
.applicant-list::-webkit-scrollbar { width: 4px; }
.applicant-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.applicant-card {
  padding: 12px 14px; border-radius: 10px; cursor: pointer;
  transition: all 0.15s; margin-bottom: 3px; border: 1px solid transparent; position: relative;
}
.applicant-card:hover { background: var(--card-hover); }
.applicant-card.active { background: var(--accent-glow); border-color: var(--accent); }
.applicant-card.scored { border-right: 3px solid var(--green); }
.app-name { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
.app-meta { display: flex; gap: 6px; align-items: center; font-size: 11px; color: var(--text-muted); }
.badge {
  display: inline-block; padding: 2px 9px; border-radius: 10px;
  font-size: 10px; font-weight: 600; color: white;
}
.badge.admin { background: linear-gradient(135deg, #8b5cf6, #06b6d4); }
.badge.member { background: linear-gradient(135deg, #22c55e, #14b8a6); }
.score-preview {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 16px; font-weight: 700;
}
.decision-dot {
  position: absolute; left: 10px; top: 10px; width: 8px; height: 8px; border-radius: 50%;
}
.decision-dot.accepted { background: var(--green); }
.decision-dot.rejected { background: var(--red); }
.decision-dot.maybe { background: var(--amber); }

.progress-bar { padding: 10px 14px; border-top: 1px solid var(--border); background: var(--bg); }
.progress-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
.progress-text { font-size: 11px; color: var(--text-muted); margin-top: 5px; text-align: center; }

.export-bar { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; gap: 6px; }
.export-btn {
  flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; color: var(--text); font-family: inherit; font-size: 12px;
  cursor: pointer; transition: all 0.2s;
}
.export-btn:hover { border-color: var(--accent); color: var(--accent); }

.main { flex: 1; overflow-y: auto; padding: 24px 32px; }
.main::-webkit-scrollbar { width: 5px; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text-muted);
}
.empty-icon { font-size: 56px; margin-bottom: 14px; opacity: 0.3; }
.empty-text { font-size: 16px; }

.profile-header {
  background: linear-gradient(135deg, rgba(139,92,246,0.08), rgba(6,182,212,0.05));
  border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 20px;
}
.profile-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.profile-name { font-size: 24px; font-weight: 700; }
.profile-name-en { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
.profile-info { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
.info-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.info-value { font-size: 13px; color: var(--text); margin-top: 1px; }

.section-title {
  font-size: 16px; font-weight: 600; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.q-count {
  background: var(--accent); color: white; padding: 2px 9px; border-radius: 10px; font-size: 11px;
}

.question-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; margin-bottom: 12px; transition: all 0.2s;
}
.question-card.leadership { border-color: rgba(139,92,246,0.3); background: linear-gradient(135deg, rgba(139,92,246,0.05), var(--card)); }
.q-category {
  font-size: 11px; font-weight: 600; color: var(--accent2);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
}
.q-text { font-size: 15px; line-height: 1.7; margin-bottom: 12px; font-weight: 500; }
.q-rubric {
  font-size: 12px; color: var(--text-muted); padding: 8px 12px;
  background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 12px;
}
.q-rubric::before { content: "معيار التقييم: "; font-weight: 600; color: var(--text-dim); }

.scoring-row { display: flex; align-items: center; gap: 12px; }
.score-label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
.score-buttons { display: flex; gap: 3px; }
.score-btn {
  width: 34px; height: 34px; border-radius: 7px; border: 1px solid var(--border);
  background: transparent; color: var(--text-dim); font-family: inherit;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.score-btn:hover { border-color: var(--accent); color: var(--accent); }
.score-btn.selected { background: var(--accent); border-color: var(--accent); color: white; }
.score-max { font-size: 11px; color: var(--text-muted); }

.notes-input {
  width: 100%; margin-top: 10px; padding: 8px 12px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: inherit; font-size: 12px;
  resize: vertical; min-height: 36px;
}
.notes-input:focus { outline: none; border-color: var(--accent); }
.notes-input::placeholder { color: var(--text-muted); }

.total-bar {
  position: sticky; bottom: 0;
  background: rgba(19,19,26,0.95); backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 14px;
  padding: 18px 24px; margin-top: 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.total-score {
  font-size: 32px; font-weight: 700;
  background: linear-gradient(135deg, #8b5cf6, #06b6d4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.total-label { font-size: 13px; color: var(--text-dim); }
.total-max { font-size: 15px; color: var(--text-muted); }
.decision-btns { display: flex; gap: 8px; }
.decision-btn {
  padding: 9px 20px; border-radius: 9px; border: none;
  font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.btn-accept { background: var(--green); color: white; }
.btn-reject { background: var(--red); color: white; }
.btn-maybe { background: var(--amber); color: #000; }
.decision-btn:hover { opacity:0.85; transform: translateY(-1px); }

.clear-btn {
  padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; color: var(--text-muted); font-family: inherit;
  font-size: 11px; cursor: pointer; transition: all 0.2s; margin-right: auto;
}
.clear-btn:hover { border-color: var(--red); color: var(--red); }

@media (max-width: 900px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; min-width: unset; max-height: 40vh; border-left: none; border-bottom: 1px solid var(--border); }
  .main { padding: 14px; }
  .header { flex-direction: column; gap: 10px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-right">
    <div class="header-title">Interview Dashboard</div>
    <div class="header-sub">نادي الذكاء الاصطناعي والعلوم التقنية — مقابلات الأعضاء</div>
  </div>
  <div class="header-stats">

  </div>
</div>

// Persist with localStorage
const STORAGE_KEY = 'acc_interview_data';
let state = loadState();
let filter = { dept:'all', type:'all', search:'' };
let sel = null;

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return { scores:{}, notes:{}, decisions:{} };
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function total(id) {
  if (!state.scores[id]) return 0;
  return Object.values(state.scores[id]).reduce((a,b)=>a+b,0);
}
function maxS(id) {
  return A.find(a=>a.id===id).qs.reduce((a,q)=>a+q.max,0);
}
function scoreColor(s,m) {
  const p=s/m; return p>=0.75?'var(--green)':p>=0.5?'var(--amber)':'var(--red)';
}

function renderList() {
  const el = document.getElementById('applicantList');
  const f = A.filter(a => {
    if (filter.dept!=='all' && a.dept!==filter.dept) return false;
    if (filter.type!=='all' && a.mem!==filter.type) return false;
    if (filter.search && !a.na.includes(filter.search) && !a.ne.toLowerCase().includes(filter.search.toLowerCase())) return false;
    return true;
  });
  el.innerHTML = f.map(a => {
    const t=total(a.id), m=maxS(a.id), scored=Object.keys(state.scores[a.id]||{}).length>0;
    const d=state.decisions[a.id];
    return `<div class="applicant-card ${sel===a.id?'active':''} ${scored?'scored':''}" onclick="selectApp(${a.id})">
      ${d?`<div class="decision-dot ${d}"></div>`:''}
      <div class="app-name">${a.na}</div>
      <div class="app-meta">
        <span class="badge ${a.mem==='إداري'?'admin':'member'}">${a.mem}</span>
        <span>${a.dept}</span><span>•</span><span>${a.maj}</span>
      </div>
      ${scored?`<div class="score-preview" style="color:${scoreColor(t,m)}">${t}</div>`:''}
    </div>`;
  }).join('');
}

function selectApp(id) {
  sel=id; renderList(); renderMain(A.find(a=>a.id===id));
}

  el.innerHTML = `

      const isL=q.cat.includes('قيادي');
      const vals=q.max===15?[0,3,6,9,12,15]:q.max===5?[0,1,2,3,4,5]:[0,2,4,6,8,10];
      const cs=(state.scores[a.id]||{})[qi];

      return `<div class="question-card ${isL?'leadership':''}">

        <div class="scoring-row">

          <div class="score-buttons">
            ${vals.map(v=>`<button class="score-btn ${cs===v?'selected':''}" onclick="setScore(${a.id},${qi},${v})">${v}</button>`).join('')}
          </div>
          <span class="score-max">/ ${q.max}</span>
        </div>
        <textarea class="notes-input" placeholder="ملاحظات اختيارية..." oninput="setNote(${a.id},${qi},this.value)">${cn}</textarea>
      </div>`;
    }).join('')}
    <div class="total-bar">
      <div>
        <div class="total-label">المجموع الكلي</div>
        <div style="display:flex;align-items:baseline;gap:6px;">
          <div class="total-score">${total(a.id)}</div>
          <div class="total-max">/ ${m}</div>
        </div>
      </div>
      <button class="clear-btn" onclick="clearScores(${a.id})">مسح الدرجات</button>
      <div class="decision-btns">
        <button class="decision-btn btn-accept" onclick="setDec(${a.id},'accepted')">✅ قبول</button>
        <button class="decision-btn btn-maybe" onclick="setDec(${a.id},'maybe')">⏳ مراجعة</button>
        <button class="decision-btn btn-reject" onclick="setDec(${a.id},'rejected')">❌ رفض</button>
      </div>
    </div>`;
  el.scrollTop=0;
}

function setScore(id,qi,v) {
  if(!state.scores[id]) state.scores[id]={};
  state.scores[id][qi]=v; saveState();
  renderMain(A.find(a=>a.id===id)); updateStats(); renderList();
}
function setNote(id,qi,v) {
  if(!state.notes[id]) state.notes[id]={};
  state.notes[id][qi]=v; saveState();
}
function setDec(id,d) {
  state.decisions[id]=d; saveState(); updateStats(); renderList();
  const idx=A.findIndex(a=>a.id===id);
  // Auto-advance to next in filtered list
  const visible=A.filter(a=>{
    if(filter.dept!=='all'&&a.dept!==filter.dept)return false;
    if(filter.type!=='all'&&a.mem!==filter.type)return false;
    if(filter.search&&!a.na.includes(filter.search)&&!a.ne.toLowerCase().includes(filter.search.toLowerCase()))return false;
    return true;
  });
  const ci=visible.findIndex(a=>a.id===id);
  if(ci<visible.length-1) selectApp(visible[ci+1].id);
}
function clearScores(id) {
  delete state.scores[id]; delete state.notes[id]; delete state.decisions[id];
  saveState(); renderMain(A.find(a=>a.id===id)); updateStats(); renderList();
}

function updateStats() {
  const dec=Object.keys(state.decisions).length;
  const acc=Object.values(state.decisions).filter(d=>d==='accepted').length;
  document.getElementById('scoredCount').textContent=dec;
  document.getElementById('acceptedCount').textContent=acc;
  document.getElementById('progressFill').style.width=((dec/A.length)*100)+'%';
  document.getElementById('progressText').textContent=dec+' / '+A.length+' تم تقييمهم';
}

function exportCSV() {
  let csv='\uFEFF';
  csv+='الاسم,الاسم بالانجليزي,القسم,نوع العضوية,المجموع,أقصى درجة,النسبة%,القرار,الملاحظات\n';
  A.forEach(a=>{
    const t=total(a.id),m=maxS(a.id),p=m>0?Math.round(t/m*100):0;
    const d=state.decisions[a.id]||'لم يُقيّم';
    const n=state.notes[a.id]?Object.values(state.notes[a.id]).filter(x=>x).join(' | '):'';
    csv+=`"${a.na}","${a.ne}","${a.dept}","${a.mem}",${t},${m},${p}%,"${d}","${n}"\n`;
  });
  dl(csv,'ACC_Interview_Results.csv','text/csv;charset=utf-8');
}
function exportJSON() {
  const r=A.map(a=>({
    name:a.na,name_en:a.ne,department:a.dept,membership:a.mem,
    total_score:total(a.id),max_score:maxS(a.id),
    percentage:Math.round(total(a.id)/maxS(a.id)*100),
    decision:state.decisions[a.id]||null,
    scores:state.scores[a.id]||{},notes:state.notes[a.id]||{}
  }));
  dl(JSON.stringify(r,null,2),'ACC_Interview_Results.json','application/json');
}
function dl(c,f,t) {
  const b=new Blob([c],{type:t}),u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download=f;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
}

document.getElementById('searchInput').addEventListener('input',e=>{filter.search=e.target.value;renderList();});
document.getElementById('deptFilters').addEventListener('click',e=>{
  if(e.target.classList.contains('filter-chip')){
    document.querySelectorAll('#deptFilters .filter-chip').forEach(c=>c.classList.remove('active'));
    e.target.classList.add('active'); filter.dept=e.target.dataset.v; renderList();
  }
});
document.getElementById('typeFilters').addEventListener('click',e=>{
  if(e.target.classList.contains('filter-chip')){
    document.querySelectorAll('#typeFilters .filter-chip').forEach(c=>c.classList.remove('active'));
    e.target.classList.add('active'); filter.type=e.target.dataset.v; renderList();
  }
});

renderList(); updateStats();
</script>
</body>
</html>
