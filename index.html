<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACC Interview Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#060611;--card:#0e0e1a;--card2:#141422;--border:#1e1e35;--accent:#7c3aed;--accent2:#2dd4bf;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--text:#e8eaf0;--dim:#8b92a8;--muted:#5a6078;--glow:rgba(124,58,237,.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}

/* HEADER */
.hdr{background:linear-gradient(135deg,rgba(124,58,237,.06),rgba(45,212,191,.04));border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.hdr-r{display:flex;flex-direction:column;gap:1px}
.hdr-t{font-size:17px;font-weight:800;background:linear-gradient(135deg,#7c3aed,#2dd4bf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-s{font-size:10px;color:var(--dim)}
.hdr-stats{display:flex;gap:14px}
.st-i{text-align:center}.st-n{font-size:18px;font-weight:800;color:var(--accent)}.st-l{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}

/* LAYOUT */
.lay{display:flex;height:calc(100vh - 52px)}

/* SIDEBAR */
.sb{width:310px;min-width:310px;border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--card)}
.flt{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:7px;flex-shrink:0}
.srch{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;width:100%;outline:none;transition:border .2s}
.srch:focus{border-color:var(--accent)}
.fr{display:flex;gap:5px;flex-wrap:wrap}
.fc{padding:4px 11px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;transition:all .15s}
.fc:hover{border-color:var(--accent);color:var(--dim)}
.fc.on{background:var(--glow);border-color:var(--accent);color:var(--accent)}
/* Decision filter */
.fc.f-acc{color:var(--green);border-color:rgba(16,185,129,.3)}.fc.f-acc.on{background:rgba(16,185,129,.1);border-color:var(--green)}
.fc.f-rej{color:var(--red);border-color:rgba(239,68,68,.3)}.fc.f-rej.on{background:rgba(239,68,68,.1);border-color:var(--red)}
.fc.f-may{color:var(--amber);border-color:rgba(245,158,11,.3)}.fc.f-may.on{background:rgba(245,158,11,.1);border-color:var(--amber)}
.fc.f-non{color:var(--muted);border-color:var(--border)}.fc.f-non.on{background:rgba(90,96,120,.15);border-color:var(--muted)}

.al{flex:1;overflow-y:auto;padding:5px;min-height:0}
.al::-webkit-scrollbar{width:3px}.al::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.ac{padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .12s;margin-bottom:2px;border:1px solid transparent;position:relative}
.ac:hover{background:var(--card2)}
.ac.on{background:var(--glow);border-color:var(--accent)}
.ac.sc{border-right:3px solid var(--green)}
.an{font-weight:700;font-size:13px;margin-bottom:2px}
.am{display:flex;gap:5px;align-items:center;font-size:10px;color:var(--muted)}
.bg{display:inline-block;padding:1px 8px;border-radius:8px;font-size:9px;font-weight:700;color:#fff}
.bg.ad{background:linear-gradient(135deg,#7c3aed,#2dd4bf)}.bg.mm{background:linear-gradient(135deg,#10b981,#14b8a6)}
.sp{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:14px;font-weight:800}
.dd{position:absolute;left:8px;top:8px;width:7px;height:7px;border-radius:50%}
.dd.accepted{background:var(--green)}.dd.rejected{background:var(--red)}.dd.maybe{background:var(--amber)}

.sb-b{flex-shrink:0}
.pb{padding:8px 12px;border-top:1px solid var(--border);background:var(--bg)}
.pt{height:4px;background:var(--border);border-radius:2px;overflow:hidden}.pf{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.px{font-size:10px;color:var(--muted);margin-top:4px;text-align:center}
.eb{padding:8px 12px;border-top:1px solid var(--border);display:flex;gap:5px}
.xb{flex:1;padding:6px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:11px;transition:all .15s}
.xb:hover{border-color:var(--accent);color:var(--accent)}

/* MAIN */
.mn{flex:1;overflow-y:auto;padding:20px 28px;height:100%}
.mn::-webkit-scrollbar{width:4px}.mn::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted)}
.empty-i{font-size:48px;margin-bottom:10px;opacity:.25}.empty-t{font-size:15px}

/* PROFILE */
.ph{background:linear-gradient(135deg,rgba(124,58,237,.06),rgba(45,212,191,.04));border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.pt2{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.pn{font-size:22px;font-weight:800}.pne{font-size:12px;color:var(--dim);margin-top:1px}
.pi{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.il{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}.iv{font-size:12px;margin-top:1px}

/* RESPONSES */
.rs{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.rt{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.rt h3{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.ta{transition:transform .2s;font-size:11px;color:var(--muted)}.ta.op{transform:rotate(90deg)}
.rb{margin-top:14px;display:none}.rb.op{display:block}
.ri{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.ri:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.rl{font-size:11px;font-weight:700;color:var(--accent2);margin-bottom:3px}
.rv{font-size:13px;line-height:1.7;white-space:pre-wrap;word-wrap:break-word}

/* SECTION */
.stit{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.qc{background:var(--accent);color:#fff;padding:2px 8px;border-radius:8px;font-size:10px}

/* ADD Q BTN */
.add-q-btn{width:100%;padding:10px;border-radius:10px;border:2px dashed var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:600;transition:all .2s;margin-bottom:12px}
.add-q-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--glow)}

/* QUESTION CARD */
.qd{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;position:relative}
.qd.ld{border-color:rgba(124,58,237,.25);background:linear-gradient(135deg,rgba(124,58,237,.04),var(--card))}
.qd.ice{border-color:rgba(45,212,191,.25);background:linear-gradient(135deg,rgba(45,212,191,.04),var(--card))}
.qd-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.qcat{font-size:10px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:.5px}
.qact{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.qd:hover .qact{opacity:1}
.qa-btn{width:24px;height:24px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.qa-btn:hover{border-color:var(--accent);color:var(--accent)}
.qa-btn.del:hover{border-color:var(--red);color:var(--red)}
.qt{font-size:14px;line-height:1.6;margin-bottom:10px;font-weight:500}
.qr{font-size:11px;color:var(--muted);padding:6px 10px;background:rgba(255,255,255,.02);border-radius:6px;margin-bottom:10px}
.qr::before{content:"معيار: ";font-weight:700;color:var(--dim)}
.scr{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sl{font-size:11px;color:var(--dim);white-space:nowrap}
.sbs{display:flex;gap:2px}
.sb2{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:700;transition:all .12s}
.sb2:hover{border-color:var(--accent);color:var(--accent)}
.sb2.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.sm{font-size:10px;color:var(--muted)}
.ni{width:100%;margin-top:8px;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;resize:vertical;min-height:30px;outline:none}
.ni:focus{border-color:var(--accent)}
.ni::placeholder{color:var(--muted)}

/* TOTAL BAR */
.tb{position:sticky;bottom:0;background:rgba(14,14,26,.96);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:12px;padding:14px 20px;margin-top:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ts{font-size:28px;font-weight:800;background:linear-gradient(135deg,#7c3aed,#2dd4bf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tl{font-size:12px;color:var(--dim)}.tmx{font-size:14px;color:var(--muted)}
.db{display:flex;gap:6px}
.d-btn{padding:8px 16px;border-radius:8px;border:none;font-size:12px;font-weight:700;transition:all .12s}
.d-acc{background:var(--green);color:#fff}.d-rej{background:var(--red);color:#fff}.d-may{background:var(--amber);color:#000}
.d-btn:hover{opacity:.85;transform:translateY(-1px)}
.clr{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;transition:all .15s;margin-right:auto}
.clr:hover{border-color:var(--red);color:var(--red)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--accent)}
.m-field{margin-bottom:12px}
.m-label{font-size:11px;color:var(--dim);margin-bottom:4px;display:block}
.m-input{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none}
.m-input:focus{border-color:var(--accent)}
.m-textarea{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;min-height:80px;resize:vertical;outline:none}
.m-textarea:focus{border-color:var(--accent)}
.m-select{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none}
.m-btns{display:flex;gap:8px;margin-top:16px}
.m-btn{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.m-save{background:var(--accent);color:#fff}.m-save:hover{opacity:.9}
.m-cancel{background:transparent;border:1px solid var(--border);color:var(--text)}.m-cancel:hover{border-color:var(--accent)}

@media(max-width:900px){
  body{overflow:auto}
  .lay{flex-direction:column;height:auto;min-height:calc(100vh - 52px)}
  .sb{width:100%;min-width:unset;height:auto;border-left:none;border-bottom:1px solid var(--border)}
  .al{max-height:30vh;min-height:180px}
  .mn{padding:12px;min-height:60vh}
  .tb{flex-direction:column;align-items:stretch;text-align:center}
  .db{justify-content:center}.clr{margin:0 auto}
  .hdr{flex-wrap:wrap;gap:6px}
}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-r"><div class="hdr-t">🎯 ACC Interview Dashboard</div><div class="hdr-s">نادي الذكاء الاصطناعي والعلوم التقنية</div></div>
  <div class="hdr-stats">
    <div class="st-i"><div class="st-n" id="cT">0</div><div class="st-l">متقدم</div></div>
    <div class="st-i"><div class="st-n" id="cS">0</div><div class="st-l">تم تقييمهم</div></div>
    <div class="st-i"><div class="st-n" id="cA">0</div><div class="st-l">مقبول</div></div>
    <div class="st-i"><div class="st-n" id="cR">0</div><div class="st-l">مرفوض</div></div>
  </div>
</div>
<div class="lay">
  <div class="sb">
    <div class="flt">
      <input type="text" class="srch" placeholder="🔍 ابحث بالاسم..." id="si">
      <div class="fr" id="df">
        <button class="fc on" data-v="all">الكل</button>
        <button class="fc" data-v="التطوير والابتكار">التطوير</button>
        <button class="fc" data-v="الفعاليات والعلاقات">الفعاليات</button>
        <button class="fc" data-v="الإنتاج الإعلامي">الإعلامي</button>
      </div>
      <div class="fr" id="tf">
        <button class="fc on" data-v="all">الكل</button>
        <button class="fc" data-v="إداري">إداري 🔑</button>
        <button class="fc" data-v="عضو">عضو</button>
      </div>
      <div class="fr" id="decf">
        <button class="fc on" data-v="all">الكل</button>
        <button class="fc f-acc" data-v="accepted">مقبول</button>
        <button class="fc f-may" data-v="maybe">مراجعة</button>
        <button class="fc f-rej" data-v="rejected">مرفوض</button>
        <button class="fc f-non" data-v="none">لم يُقيّم</button>
      </div>
    </div>
    <div class="al" id="aList"><div style="padding:16px;text-align:center;color:var(--muted)">جاري التحميل...</div></div>
    <div class="sb-b">
      <div class="pb"><div class="pt"><div class="pf" id="pF"></div></div><div class="px" id="pT">0 / 0</div></div>
      <div class="eb">
        <button class="xb" onclick="W.csv()">📊 CSV</button>
        <button class="xb" onclick="W.json()">💾 JSON</button>
        <button class="xb" onclick="W.reset()" style="color:var(--red)">🗑️ مسح الكل</button>
      </div>
    </div>
  </div>
  <div class="mn" id="mc"><div class="empty"><div class="empty-i">📋</div><div class="empty-t">اختر متقدم من القائمة لبدء المقابلة</div></div></div>
</div>

<!-- ADD/EDIT QUESTION MODAL -->
<div class="modal-bg" id="qModal">
  <div class="modal">
    <h3 id="mTitle">إضافة سؤال</h3>
    <div class="m-field"><label class="m-label">التصنيف</label><input class="m-input" id="mCat" placeholder="مثال: سؤال إضافي"></div>
    <div class="m-field"><label class="m-label">السؤال</label><textarea class="m-textarea" id="mQ" placeholder="اكتب السؤال هنا..."></textarea></div>
    <div class="m-field"><label class="m-label">معيار التقييم</label><input class="m-input" id="mRub" placeholder="مثال: الوضوح - العمق - الأصالة"></div>
    <div class="m-field"><label class="m-label">الدرجة القصوى</label>
      <select class="m-select" id="mMax"><option value="5">5</option><option value="10" selected>10</option><option value="15">15</option><option value="20">20</option></select>
    </div>
    <div class="m-btns">
      <button class="m-btn m-save" onclick="W.saveQ()">💾 حفظ</button>
      <button class="m-btn m-cancel" onclick="W.closeM()">إلغاء</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
(function(){
var A=window.APPDATA;
if(!A||!A.length){document.getElementById('aList').innerHTML='<div style="padding:16px;color:var(--red)">خطأ: لم يتم تحميل البيانات</div>';return}

var SK='acc_v5',st,fl={dept:'all',type:'all',dec:'all',search:''},sel=null,editQi=-1;

// Custom questions stored per applicant: st.custom_qs[id] = [{cat,q,rub,max},...]
try{var r=localStorage.getItem(SK);st=r?JSON.parse(r):{}}catch(e){st={}}
if(!st.scores)st.scores={};if(!st.notes)st.notes={};if(!st.decisions)st.decisions={};
if(!st.custom_qs)st.custom_qs={};if(!st.q_edits)st.q_edits={};if(!st.q_deletes)st.q_deletes={};
function save(){try{localStorage.setItem(SK,JSON.stringify(st))}catch(e){}}

function getQs(a){
  var base=[];
  var dels=st.q_deletes[a.id]||{};
  for(var i=0;i<a.qs.length;i++){
    if(dels[i])continue;
    var q=Object.assign({},a.qs[i]);
    var ed=(st.q_edits[a.id]||{})[i];
    if(ed){q.cat=ed.cat||q.cat;q.q=ed.q||q.q;q.rub=ed.rub||q.rub;q.max=ed.max||q.max}
    q._oi=i;q._custom=false;
    base.push(q);
  }
  var cust=st.custom_qs[a.id]||[];
  for(var j=0;j<cust.length;j++){
    var cq=Object.assign({},cust[j]);cq._oi='c'+j;cq._custom=true;
    base.push(cq);
  }
  return base;
}
function tot(a){var id=a.id,s=0;if(st.scores[id])for(var k in st.scores[id])s+=st.scores[id][k];return s}
function maxS(a){var qs=getQs(a),s=0;for(var i=0;i<qs.length;i++)s+=qs[i].max;return s}
function sCol(s,m){var p=s/m;return p>=.75?'var(--green)':p>=.5?'var(--amber)':'var(--red)'}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function findA(id){for(var i=0;i<A.length;i++)if(A[i].id===id)return A[i];return null}

function renderList(){
  var el=document.getElementById('aList'),h='',c=0;
  for(var i=0;i<A.length;i++){
    var a=A[i];
    if(fl.dept!=='all'&&a.dept!==fl.dept)continue;
    if(fl.type!=='all'&&a.mem!==fl.type)continue;
    if(fl.search&&a.na.indexOf(fl.search)===-1&&a.ne.toLowerCase().indexOf(fl.search.toLowerCase())===-1)continue;
    var d=st.decisions[a.id]||'';
    if(fl.dec!=='all'){if(fl.dec==='none'&&d)continue;if(fl.dec!=='none'&&d!==fl.dec)continue}
    c++;var t=tot(a),m=maxS(a),sc=st.scores[a.id]&&Object.keys(st.scores[a.id]).length>0;
    h+='<div class="ac'+(sel===a.id?' on':'')+(sc?' sc':'')+'" onclick="W.sel('+a.id+')">';
    if(d)h+='<div class="dd '+d+'"></div>';
    h+='<div class="an">'+esc(a.na)+'</div><div class="am"><span class="bg '+(a.mem==='إداري'?'ad':'mm')+'">'+esc(a.mem)+'</span><span>'+esc(a.dept)+'</span></div>';
    if(sc)h+='<div class="sp" style="color:'+sCol(t,m)+'">'+t+'</div>';
    h+='</div>';
  }
  if(!c)h='<div style="padding:16px;text-align:center;color:var(--muted)">لا توجد نتائج</div>';
  el.innerHTML=h;
}

function renderMain(a){
  var el=document.getElementById('mc'),qs=getQs(a),m=maxS(a);
  var rh='';
  if(a.resp&&a.resp.length){
    for(var ri=0;ri<a.resp.length;ri++){var r=a.resp[ri];rh+='<div class="ri"><div class="rl">'+esc(r.label)+'</div><div class="rv">'+esc(r.value)+'</div></div>'}
  }
  var qh='';
  for(var qi=0;qi<qs.length;qi++){
    var q=qs[qi],isL=q.cat.indexOf('قيادي')!==-1,isIce=q.cat.indexOf('تعارف')!==-1||q.cat.indexOf('تنافسية')!==-1;
    var vals=q.max===15?[0,3,6,9,12,15]:q.max===20?[0,5,10,15,20]:q.max===5?[0,1,2,3,4,5]:[0,2,4,6,8,10];
    var key=String(q._oi);
    var cs=st.scores[a.id]?st.scores[a.id][key]:undefined;
    var cn=st.notes[a.id]&&st.notes[a.id][key]?st.notes[a.id][key]:'';
    qh+='<div class="qd'+(isL?' ld':'')+(isIce?' ice':'')+'">';
    qh+='<div class="qd-top"><div class="qcat">'+esc(q.cat)+'</div>';
    qh+='<div class="qact"><button class="qa-btn" onclick="W.editQ('+a.id+','+qi+')" title="تعديل">✏️</button>';
    qh+='<button class="qa-btn del" onclick="W.delQ('+a.id+','+qi+')" title="حذف">🗑️</button></div></div>';
    qh+='<div class="qt">'+esc(q.q)+'</div>';
    qh+='<div class="qr">'+esc(q.rub)+'</div>';
    qh+='<div class="scr"><span class="sl">التقييم:</span><div class="sbs">';
    for(var vi=0;vi<vals.length;vi++){var v=vals[vi];qh+='<button class="sb2'+(cs===v?' sel':'')+'" onclick="W.sc('+a.id+',\''+key+'\','+v+')">'+v+'</button>'}
    qh+='</div><span class="sm">/ '+q.max+'</span></div>';
    qh+='<textarea class="ni" placeholder="ملاحظات..." oninput="W.nt('+a.id+',\''+key+'\',this.value)">'+esc(cn)+'</textarea></div>';
  }

  el.innerHTML='<div class="ph"><div class="pt2"><div><div class="pn">'+esc(a.na)+'</div><div class="pne">'+esc(a.ne)+'</div></div><span class="bg '+(a.mem==='إداري'?'ad':'mm')+'" style="font-size:12px;padding:4px 14px">'+(a.mem==='إداري'?'🔑 عضو إداري':'👤 عضو قسم')+'</span></div><div class="pi"><div><div class="il">القسم</div><div class="iv">'+esc(a.dept)+'</div></div><div><div class="il">التخصص</div><div class="iv">'+esc(a.maj)+'</div></div><div><div class="il">المستوى</div><div class="iv">'+esc(a.lvl)+'</div></div><div><div class="il">الشطر</div><div class="iv">'+esc(a.sec)+'</div></div><div><div class="il">الساعات</div><div class="iv">'+esc(a.hrs)+'</div></div></div></div>'
  +(a.resp&&a.resp.length?'<div class="rs"><div class="rt" onclick="W.tr()"><h3>📄 إجابات الطلب الكاملة <span style="font-size:10px;color:var(--muted);font-weight:400">('+a.resp.length+')</span></h3><span class="ta" id="tA">◀</span></div><div class="rb" id="rB">'+rh+'</div></div>':'')
  +'<div class="stit">أسئلة المقابلة <span class="qc">'+qs.length+' سؤال</span></div>'
  +'<button class="add-q-btn" onclick="W.addQ('+a.id+')">➕ إضافة سؤال جديد</button>'
  +qh
  +'<div class="tb"><div><div class="tl">المجموع</div><div style="display:flex;align-items:baseline;gap:4px"><div class="ts">'+tot(a)+'</div><div class="tmx">/ '+m+'</div></div></div><button class="clr" onclick="W.cl('+a.id+')">مسح</button><div class="db"><button class="d-btn d-acc" onclick="W.dc('+a.id+',\'accepted\')">✅ قبول</button><button class="d-btn d-may" onclick="W.dc('+a.id+',\'maybe\')">⏳ مراجعة</button><button class="d-btn d-rej" onclick="W.dc('+a.id+',\'rejected\')">❌ رفض</button></div></div>';
  el.scrollTop=0;
}

function stats(){
  var d=Object.keys(st.decisions).length,ac=0,rj=0;
  for(var k in st.decisions){if(st.decisions[k]==='accepted')ac++;if(st.decisions[k]==='rejected')rj++}
  document.getElementById('cT').textContent=A.length;
  document.getElementById('cS').textContent=d;
  document.getElementById('cA').textContent=ac;
  document.getElementById('cR').textContent=rj;
  document.getElementById('pF').style.width=((d/A.length)*100)+'%';
  document.getElementById('pT').textContent=d+' / '+A.length+' تم تقييمهم';
}

function getVis(){
  var v=[];for(var i=0;i<A.length;i++){var a=A[i];
    if(fl.dept!=='all'&&a.dept!==fl.dept)continue;if(fl.type!=='all'&&a.mem!==fl.type)continue;
    if(fl.search&&a.na.indexOf(fl.search)===-1&&a.ne.toLowerCase().indexOf(fl.search.toLowerCase())===-1)continue;
    var d=st.decisions[a.id]||'';
    if(fl.dec!=='all'){if(fl.dec==='none'&&d)continue;if(fl.dec!=='none'&&d!==fl.dec)continue}
    v.push(a);}return v;
}

// Global API
window.W={
  sel:function(id){sel=id;renderList();var a=findA(id);if(a)renderMain(a)},
  tr:function(){var b=document.getElementById('rB'),a=document.getElementById('tA');if(b&&a){b.classList.toggle('op');a.classList.toggle('op')}},
  sc:function(id,key,v){if(!st.scores[id])st.scores[id]={};st.scores[id][key]=v;save();var a=findA(id);if(a)renderMain(a);stats();renderList()},
  nt:function(id,key,v){if(!st.notes[id])st.notes[id]={};st.notes[id][key]=v;save()},
  dc:function(id,d){st.decisions[id]=d;save();stats();renderList();var v=getVis(),ci=-1;for(var j=0;j<v.length;j++)if(v[j].id===id){ci=j;break}if(ci>=0&&ci<v.length-1)W.sel(v[ci+1].id)},
  cl:function(id){delete st.scores[id];delete st.notes[id];delete st.decisions[id];save();var a=findA(id);if(a)renderMain(a);stats();renderList()},
  
  // Question management
  addQ:function(id){editQi=-1;sel=id;
    document.getElementById('mTitle').textContent='إضافة سؤال جديد';
    document.getElementById('mCat').value='سؤال إضافي';
    document.getElementById('mQ').value='';
    document.getElementById('mRub').value='';
    document.getElementById('mMax').value='10';
    document.getElementById('qModal').classList.add('show');
  },
  editQ:function(id,qi){
    var a=findA(id);if(!a)return;
    var qs=getQs(a);if(qi>=qs.length)return;
    var q=qs[qi];sel=id;editQi=qi;
    document.getElementById('mTitle').textContent='تعديل السؤال';
    document.getElementById('mCat').value=q.cat;
    document.getElementById('mQ').value=q.q;
    document.getElementById('mRub').value=q.rub;
    document.getElementById('mMax').value=String(q.max);
    document.getElementById('qModal').classList.add('show');
  },
  saveQ:function(){
    var a=findA(sel);if(!a)return;
    var cat=document.getElementById('mCat').value.trim();
    var q=document.getElementById('mQ').value.trim();
    var rub=document.getElementById('mRub').value.trim();
    var max=parseInt(document.getElementById('mMax').value)||10;
    if(!q){alert('يرجى كتابة السؤال');return}
    
    if(editQi===-1){
      // Adding new
      if(!st.custom_qs[a.id])st.custom_qs[a.id]=[];
      st.custom_qs[a.id].push({cat:cat||'سؤال إضافي',q:q,rub:rub||'تقييم عام',max:max});
    } else {
      // Editing existing
      var qs=getQs(a);
      var eq=qs[editQi];
      if(eq._custom){
        var ci=parseInt(String(eq._oi).replace('c',''));
        st.custom_qs[a.id][ci]={cat:cat,q:q,rub:rub,max:max};
      } else {
        if(!st.q_edits[a.id])st.q_edits[a.id]={};
        st.q_edits[a.id][eq._oi]={cat:cat,q:q,rub:rub,max:max};
      }
    }
    save();W.closeM();renderMain(a);stats();
  },
  delQ:function(id,qi){
    var a=findA(id);if(!a)return;
    var qs=getQs(a);if(qi>=qs.length)return;
    if(!confirm('حذف هذا السؤال؟'))return;
    var eq=qs[qi];
    if(eq._custom){
      var ci=parseInt(String(eq._oi).replace('c',''));
      st.custom_qs[a.id].splice(ci,1);
    } else {
      if(!st.q_deletes[a.id])st.q_deletes[a.id]={};
      st.q_deletes[a.id][eq._oi]=true;
    }
    // Remove associated score/note
    var key=String(eq._oi);
    if(st.scores[id])delete st.scores[id][key];
    if(st.notes[id])delete st.notes[id][key];
    save();renderMain(a);stats();
  },
  closeM:function(){document.getElementById('qModal').classList.remove('show')},
  
  // Export
  csv:function(){
    var csv='\uFEFF'+'الاسم,الاسم بالانجليزي,القسم,نوع العضوية,المجموع,أقصى درجة,النسبة%,القرار,الملاحظات\n';
    for(var i=0;i<A.length;i++){var a=A[i],t=tot(a),m=maxS(a),p=m>0?Math.round(t/m*100):0,d=st.decisions[a.id]||'لم يُقيّم',n='';
      if(st.notes[a.id]){var nv=[];for(var k in st.notes[a.id])if(st.notes[a.id][k])nv.push(st.notes[a.id][k]);n=nv.join(' | ')}
      csv+='"'+a.na+'","'+a.ne+'","'+a.dept+'","'+a.mem+'",'+t+','+m+','+p+'%,"'+d+'","'+n.replace(/"/g,'""')+'"\n';}
    dl(csv,'ACC_Results.csv','text/csv;charset=utf-8');
  },
  json:function(){
    var r=[];for(var i=0;i<A.length;i++){var a=A[i];
      r.push({name:a.na,name_en:a.ne,department:a.dept,membership:a.mem,total:tot(a),max:maxS(a),pct:Math.round(tot(a)/maxS(a)*100),decision:st.decisions[a.id]||null,scores:st.scores[a.id]||{},notes:st.notes[a.id]||{}})}
    dl(JSON.stringify(r,null,2),'ACC_Results.json','application/json');
  },
  reset:function(){if(confirm('مسح جميع التقييمات والبيانات المحفوظة؟ لا يمكن التراجع!')){localStorage.removeItem(SK);st={scores:{},notes:{},decisions:{},custom_qs:{},q_edits:{},q_deletes:{}};save();if(sel){var a=findA(sel);if(a)renderMain(a)}stats();renderList()}}
};
function dl(c,f,t){var b=new Blob([c],{type:t}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=f;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)}

// Filters
document.getElementById('si').addEventListener('input',function(e){fl.search=e.target.value;renderList()});
['df','tf','decf'].forEach(function(fid){
  var key=fid==='df'?'dept':fid==='tf'?'type':'dec';
  document.getElementById(fid).addEventListener('click',function(e){
    if(e.target.classList.contains('fc')){
      var cs=e.target.parentNode.querySelectorAll('.fc');
      for(var i=0;i<cs.length;i++)cs[i].classList.remove('on');
      e.target.classList.add('on');fl[key]=e.target.getAttribute('data-v');renderList();}
  });
});

// Close modal on bg click
document.getElementById('qModal').addEventListener('click',function(e){if(e.target===this)W.closeM()});

renderList();stats();
console.log('ACC Dashboard v5 loaded: '+A.length+' applicants');
})();
</script>
